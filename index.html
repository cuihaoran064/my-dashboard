<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>我的全能看板</title>
    <script src="https://unpkg.com/feather-icons"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root { --bg: #F2F2F7; --card: #FFFFFF; --blue: #007AFF; --green: #34C759; --orange: #FF9500; --text: #1C1C1E; --gray: #8E8E93; --border: #E5E5EA; }
        body { background: var(--bg); color: var(--text); font-family: -apple-system, sans-serif; padding: 15px; margin: 0; padding-bottom: 50px; }
        .container { max-width: 950px; margin: 0 auto; }
        
        .tabs { display: flex; background: #E3E3E8; border-radius: 10px; padding: 2px; margin-bottom: 15px; }
        .tab-btn { flex: 1; border: none; padding: 10px; border-radius: 8px; font-size: 14px; cursor: pointer; background: none; }
        .tab-btn.active { background: white; box-shadow: 0 2px 5px rgba(0,0,0,0.1); font-weight: 600; }
        
        .date-nav { display: flex; align-items: center; justify-content: center; gap: 20px; margin-bottom: 15px; }
        #current-date-label { font-size: 15px; font-weight: 700; text-align: center; min-width: 220px; line-height: 1.3; }

        .card { background: var(--card); border-radius: 18px; padding: 20px; margin-bottom: 15px; box-shadow: 0 2px 15px rgba(0,0,0,0.03); }
        .header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 12px; font-weight: 700; border-bottom: 1px solid var(--border); padding-bottom: 8px; }

        /* 1. 习惯打卡日历 */
        .habit-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 4px; text-align: center; margin-top: 10px; }
        .weekday { font-size: 10px; color: var(--gray); margin-bottom: 4px; }
        .day-cell { aspect-ratio: 1; display: flex; align-items: center; justify-content: center; border-radius: 8px; font-size: 12px; cursor: pointer; background: #F9F9FB; transition: 0.2s; }
        .day-cell.active { background: var(--orange); color: white; font-weight: bold; }
        .day-cell.today { border: 2px solid var(--blue); }

        /* 2. 经典三栏布局 */
        .module-grid { display: grid; grid-template-columns: 1.2fr 1fr 0.8fr; gap: 15px; }
        @media (max-width: 850px) { .module-grid { grid-template-columns: 1fr; } }
        
        .todo-list { min-height: 50px; }
        .todo-item { display: flex; align-items: center; gap: 8px; padding: 8px 0; border-bottom: 1px solid #F9F9FB; font-size: 14px; }
        input[type="text"], textarea { border: none; outline: none; width: 100%; font-size: 14px; background: transparent; }
        textarea { background: #F9F9FB; border-radius: 10px; padding: 10px; height: 110px; resize: none; border: 1px solid var(--border); }
        .chart-container { height: 130px; position: relative; }
    </style>
</head>
<body>

<div class="container">
    <div class="tabs">
        <button class="tab-btn active" onclick="switchFrame('day')">日报</button>
        <button class="tab-btn" onclick="switchFrame('week')">周报</button>
        <button class="tab-btn" onclick="switchFrame('year')">年报</button>
    </div>

    <div class="date-nav">
        <i data-feather="chevron-left" onclick="changeDate(-1)"></i>
        <div id="current-date-label">加载中...</div>
        <i data-feather="chevron-right" onclick="changeDate(1)"></i>
    </div>

    <div id="habit-section"></div>
    <div class="card" style="border: 1px dashed var(--orange); padding: 10px; margin-top: -5px;">
        <input type="text" id="habit-input" placeholder="+ 新增固定习惯 (如: 体重记录)" onkeypress="if(event.key==='Enter') createHabit(this.value)">
    </div>

    <div class="card">
        <div class="header" style="color:var(--blue)"><span><i data-feather="briefcase"></i> 工作 WORK</span></div>
        <div class="module-grid">
            <div>
                <div id="work-todos" class="todo-list"></div>
                <div class="todo-item"><input type="text" placeholder="+ 新任务..." onkeypress="if(event.key==='Enter') addTask('work', this.value)"></div>
            </div>
            <div><textarea id="work-sum" placeholder="工作总结与心得..." onblur="saveSum('work', this.value)"></textarea></div>
            <div class="chart-container"><canvas id="workChart"></canvas></div>
        </div>
    </div>

    <div class="card">
        <div class="header" style="color:var(--green)"><span><i data-feather="heart"></i> 生活 LIFE</span></div>
        <div class="module-grid">
            <div>
                <div id="life-todos" class="todo-list"></div>
                <div class="todo-item"><input type="text" placeholder="+ 新计划..." onkeypress="if(event.key==='Enter') addTask('life', this.value)"></div>
            </div>
            <div><textarea id="life-sum" placeholder="生活感悟与心情..." onblur="saveSum('life', this.value)"></textarea></div>
            <div class="chart-container"><canvas id="lifeChart"></canvas></div>
        </div>
    </div>
</div>

<script>
    const SB_URL = "https://jklxlcobtwtgddifcmlx.supabase.co";
    const SB_KEY = "sb_publishable_bjEGqcp5cYThRF-fvqUceg_zyLVXIAY"; 
    const sb = supabase.createClient(SB_URL, SB_KEY);

    let currentFrame = 'day', viewDate = new Date(), workChart, lifeChart;

    // --- 日期处理逻辑 ---
    function getWeekInfo(date) {
        const d = new Date(date);
        const day = (d.getDay() + 6) % 7;
        const mon = new Date(d); mon.setDate(d.getDate() - day);
        const sun = new Date(mon); sun.setDate(mon.getDate() + 6);
        const fmt = (dt) => `${dt.getFullYear()}.${String(dt.getMonth()+1).padStart(2,'0')}.${String(dt.getDate()).padStart(2,'0')}周${['日','一','二','三','四','五','六'][dt.getDay()]}`;
        const startOfYear = new Date(d.getFullYear(), 0, 1);
        const weekNum = Math.ceil((((d - startOfYear) / 84600000) + startOfYear.getDay() + 1) / 7);
        return { num: weekNum, range: `${fmt(mon)} - ${fmt(sun)}` };
    }

    function getTag() {
        if (currentFrame === 'day') return `${viewDate.getFullYear()}-${viewDate.getMonth()+1}-${viewDate.getDate()}`;
        if (currentFrame === 'week') return `${viewDate.getFullYear()}-W${getWeekInfo(viewDate).num}`;
        return `${viewDate.getFullYear()}-YEAR`;
    }

    // --- 核心加载逻辑 ---
    async function loadPage() {
        updateLabel();
        const tag = getTag();

        const [habits, logs, todos, sums] = await Promise.all([
            sb.from('habit_definitions').select('*').order('created_at'),
            sb.from('habit_logs').select('*'),
            sb.from('todos').select('*').eq('time_frame', tag).order('created_at'),
            sb.from('summaries').select('*').eq('time_frame', tag)
        ]);

        renderHabitCalendars(habits.data || [], logs.data || []);
        renderTodos(todos.data || []);
        
        document.getElementById('work-sum').value = sums.data?.find(s => s.category === 'work')?.content || '';
        document.getElementById('life-sum').value = sums.data?.find(s => s.category === 'life')?.content || '';
        
        updateCharts(todos.data || []);
        feather.replace();
    }

    function renderHabitCalendars(defs, allLogs) {
        const container = document.getElementById('habit-section');
        const now = new Date(); const y = now.getFullYear(), m = now.getMonth();
        container.innerHTML = defs.map(h => {
            const hLogs = allLogs.filter(l => l.habit_id === h.id);
            return `<div class="card">
                <div class="header" style="color:var(--orange)"><span><i data-feather="award"></i> ${h.name}</span><span style="font-size:12px">${y}.${m+1}</span></div>
                <div class="habit-grid">
                    ${['一','二','三','四','五','六','日'].map(w=>`<div class="weekday">${w}</div>`).join('')}
                    ${generateCalendar(y, m, h.id, hLogs)}
                </div>
            </div>`;
        }).join('');
    }

    function generateCalendar(y, m, id, logs) {
        const first = new Date(y, m, 1).getDay();
        const days = new Date(y, m + 1, 0).getDate();
        const offset = first === 0 ? 6 : first - 1;
        let html = '';
        for (let i = 0; i < offset; i++) html += '<div></div>';
        for (let d = 1; d <= days; d++) {
            const s = `${y}-${m+1}-${d}`;
            const done = logs.some(l => l.log_date === s);
            const today = new Date().toDateString() === new Date(y,m,d).toDateString();
            html += `<div class="day-cell ${done?'active':''} ${today?'today':''}" onclick="toggleHabit('${id}','${s}',${done})">${d}</div>`;
        }
        return html;
    }

    // --- 数据交互 ---
    async function toggleHabit(id, date, done) {
        if(done) await sb.from('habit_logs').delete().eq('habit_id', id).eq('log_date', date);
        else await sb.from('habit_logs').insert([{ habit_id: id, log_date: date, remark: "" }]);
        loadPage();
    }

    function renderTodos(list) {
        ['work', 'life'].forEach(cat => {
            document.getElementById(`${cat}-todos`).innerHTML = list.filter(t => t.category === cat).map(t => `
                <div class="todo-item">
                    <i data-feather="${t.is_completed?'check-circle':'circle'}" style="color:${t.is_completed?'var(--blue)':'var(--border)'}" onclick="toggleTodo('${t.id}',${t.is_completed})"></i>
                    <span style="${t.is_completed?'text-decoration:line-through;color:gray':''}">${t.content}</span>
                </div>`).join('');
        });
    }

    async function addTask(cat, val) {
        await sb.from('todos').insert([{ category: cat, content: val, time_frame: getTag() }]);
        loadPage();
    }

    async function toggleTodo(id, st) {
        await sb.from('todos').update({ is_completed: !st }).eq('id', id);
        loadPage();
    }

    async function saveSum(cat, val) {
        await sb.from('summaries').upsert({ category: cat, content: val, time_frame: getTag() }, { onConflict: 'category,time_frame' });
    }

    async function createHabit(n) { if(n) await sb.from('habit_definitions').insert([{name:n}]); loadPage(); }

    // --- 图表与导航 ---
    async function updateCharts(todos) {
        const lItems = todos.filter(t => t.category === 'life');
        const lDone = lItems.filter(t => t.is_completed).length;
        lifeChart.data.datasets[0].data = [lDone, Math.max(0, lItems.length - lDone) || 1];
        lifeChart.update();
        const counts = [];
        for (let i = 6; i >= 0; i--) {
            const d = new Date(); d.setDate(d.getDate() - i);
            const { count } = await sb.from('todos').select('*', { count: 'exact', head: true }).eq('time_frame', `${d.getFullYear()}-${d.getMonth()+1}-${d.getDate()}`).eq('category', 'work').eq('is_completed', true);
            counts.push(count || 0);
        }
        workChart.data.datasets[0].data = counts;
        workChart.update();
    }

    function updateLabel() {
        const label = document.getElementById('current-date-label');
        if (currentFrame === 'day') label.innerText = `${viewDate.getFullYear()}年${viewDate.getMonth()+1}月${viewDate.getDate()}日`;
        else if (currentFrame === 'week') { const info = getWeekInfo(viewDate); label.innerHTML = `第 ${info.num} 周<br><span style="font-size:11px; font-weight:normal; color:gray">${info.range}</span>`; }
        else label.innerText = `${viewDate.getFullYear()} 年度总结`;
    }

    function changeDate(s) {
        if (currentFrame === 'day') viewDate.setDate(viewDate.getDate() + s);
        else if (currentFrame === 'week') viewDate.setDate(viewDate.getDate() + s * 7);
        else viewDate.setFullYear(viewDate.getFullYear() + s);
        loadPage();
    }

    function switchFrame(f) {
        currentFrame = f;
        document.querySelectorAll('.tab-btn').forEach(b => b.classList.toggle('active', b.innerText.includes(f==='day'?'日':f==='week'?'周':'年')));
        loadPage();
    }

    window.onload = () => {
        workChart = new Chart(document.getElementById('workChart'), { type: 'line', data: { labels: ['6天前','5','4','3','2','1','今'], datasets: [{ data: [], borderColor: '#007AFF', tension: 0.4, fill: true, backgroundColor: 'rgba(0,122,255,0.05)' }] }, options: { maintainAspectRatio: false, plugins: { legend: false } } });
        lifeChart = new Chart(document.getElementById('lifeChart'), { type: 'doughnut', data: { datasets: [{ data: [0, 1], backgroundColor: ['#34C759', '#E5E5EA'] }] }, options: { maintainAspectRatio: false, cutout: '75%' } });
        loadPage();
    };
</script>
</body>
</html>
