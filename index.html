<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>我的全能看板</title>
    <script src="https://unpkg.com/feather-icons"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root { --bg: #F2F2F7; --card: #FFFFFF; --blue: #007AFF; --green: #34C759; --orange: #FF9500; --text: #1C1C1E; --gray: #8E8E93; --border: #E5E5EA; }
        body { background: var(--bg); color: var(--text); font-family: -apple-system, sans-serif; padding: 15px; margin: 0; }
        .container { max-width: 900px; margin: 0 auto; }
        .tabs { display: flex; background: #E3E3E8; border-radius: 10px; padding: 2px; margin-bottom: 15px; }
        .tab-btn { flex: 1; border: none; padding: 8px; border-radius: 8px; font-size: 14px; cursor: pointer; background: none; }
        .tab-btn.active { background: white; box-shadow: 0 2px 5px rgba(0,0,0,0.1); font-weight: 600; }
        .date-nav { display: flex; align-items: center; justify-content: center; gap: 15px; margin-bottom: 15px; }
        #current-date-label { font-size: 14px; font-weight: 700; text-align: center; line-height: 1.4; }
        .card { background: var(--card); border-radius: 18px; padding: 20px; margin-bottom: 15px; box-shadow: 0 2px 15px rgba(0,0,0,0.03); }
        .header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 15px; font-weight: 700; border-bottom: 1px solid var(--border); padding-bottom: 10px; }
        .calendar-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 5px; text-align: center; }
        .weekday { font-size: 11px; color: var(--gray); }
        .day-cell { aspect-ratio: 1; display: flex; align-items: center; justify-content: center; border-radius: 10px; font-size: 13px; cursor: pointer; background: #F9F9FB; }
        .day-cell.today { border: 2px solid var(--blue); }
        .day-cell.active { background: var(--orange); color: white; }
        .todo-item { display: flex; align-items: center; gap: 8px; padding: 8px 0; border-bottom: 1px solid #F9F9FB; font-size: 14px; }
        input[type="text"] { border: none; outline: none; width: 100%; font-size: 14px; background: transparent; }
    </style>
</head>
<body>

<div class="container">
    <div class="tabs">
        <button class="tab-btn active" onclick="switchFrame('day')">日报</button>
        <button class="tab-btn" onclick="switchFrame('week')">周报</button>
    </div>

    <div class="date-nav">
        <i data-feather="chevron-left" onclick="changeDate(-1)"></i>
        <div id="current-date-label">加载中...</div>
        <i data-feather="chevron-right" onclick="changeDate(1)"></i>
    </div>

    <div id="habit-container"></div>
    <div class="card" style="border: 1px dashed var(--orange); padding: 10px;"><input id="habit-name-input" type="text" placeholder="+ 新增习惯名称" onkeypress="if(event.key==='Enter') createHabit(this.value)"></div>

    <div id="task-area" class="card">
        <div id="work-todos"></div>
        <div class="todo-item"><input id="work-input" type="text" placeholder="+ 添加任务" onkeypress="if(event.key==='Enter') addTask('work', this.value)"></div>
    </div>
</div>

<script>
    const SB_URL = "https://jklxlcobtwtgddifcmlx.supabase.co";
    const SB_KEY = "sb_publishable_bjEGqcp5cYThRF-fvqUceg_zyLVXIAY"; 
    const sb = supabase.createClient(SB_URL, SB_KEY);

    let viewDate = new Date();
    let currentFrame = 'day';

    // 获取周数及范围的核心逻辑
    function getWeekInfo(date) {
        const target = new Date(date.valueOf());
        const dayNr = (date.getDay() + 6) % 7; // 周一为0，周日为6
        target.setDate(target.getDate() - dayNr + 3);
        const firstThursday = target.valueOf();
        target.setMonth(0, 1);
        if (target.getDay() !== 4) target.setMonth(0, 1 + ((4 - target.getDay()) + 7) % 7);
        const weekNum = 1 + Math.ceil((firstThursday - target) / 604800000);

        // 计算周一和周日的日期
        const monday = new Date(date);
        monday.setDate(date.getDate() - dayNr);
        const sunday = new Date(monday);
        sunday.setDate(monday.getDate() + 6);

        const formatDate = (d) => `${d.getFullYear()}.${String(d.getMonth()+1).padStart(2,'0')}.${String(d.getDate()).padStart(2,'0')}周${['日','一','二','三','四','五','六'][d.getDay()]}`;
        return { num: weekNum, range: `${formatDate(monday)} - ${formatDate(sunday)}` };
    }

    function getTag(d = viewDate) {
        if (currentFrame === 'day') return `${d.getFullYear()}-${d.getMonth()+1}-${d.getDate()}`;
        const info = getWeekInfo(d);
        return `${d.getFullYear()}-W${info.num}`;
    }

    async function loadAll() {
        updateLabel();
        const tag = getTag();
        const [todoRes, habitDef, habitLogs] = await Promise.all([
            sb.from('todos').select('*').eq('time_frame', tag),
            sb.from('habit_definitions').select('*').order('created_at'),
            sb.from('habit_logs').select('*')
        ]);
        renderTodos(todoRes.data || []);
        renderHabitCalendars(habitDef.data || [], habitLogs.data || []);
        feather.replace();
    }

    function updateLabel() {
        const label = document.getElementById('current-date-label');
        if (currentFrame === 'day') {
            label.innerText = `${viewDate.getFullYear()}年${viewDate.getMonth()+1}月${viewDate.getDate()}日`;
        } else {
            const info = getWeekInfo(viewDate);
            label.innerHTML = `第 ${info.num} 周<br><span style="font-size:11px; color:gray; font-weight:normal">${info.range}</span>`;
        }
    }

    function renderHabitCalendars(defs, allLogs) {
        const container = document.getElementById('habit-container');
        const year = viewDate.getFullYear(), month = viewDate.getMonth();
        container.innerHTML = defs.map(h => {
            const logs = allLogs.filter(l => l.habit_id === h.id);
            return `<div class="card">
                <div class="header" style="color:var(--orange)"><span><i data-feather="award"></i> ${h.name}</span><span style="font-size:12px">${year}.${month+1}</span></div>
                <div class="calendar-grid">
                    ${['一','二','三','四','五','六','日'].map(w=>`<div class="weekday">${w}</div>`).join('')}
                    ${generateCells(year, month, h.id, logs)}
                </div>
            </div>`;
        }).join('');
    }

    function generateCells(y, m, id, logs) {
        const first = new Date(y, m, 1).getDay();
        const days = new Date(y, m + 1, 0).getDate();
        const offset = first === 0 ? 6 : first - 1;
        let html = '';
        for (let i = 0; i < offset; i++) html += '<div></div>';
        for (let d = 1; d <= days; d++) {
            const s = `${y}-${m+1}-${d}`;
            const done = logs.some(l => l.log_date === s);
            const today = new Date().toDateString() === new Date(y,m,d).toDateString();
            html += `<div class="day-cell ${done?'active':''} ${today?'today':''}" onclick="habitClick('${id}','${s}',${done})">${d}</div>`;
        }
        return html;
    }

    async function habitClick(id, date, done) {
        if(done) { if(confirm("取消打卡？")) await sb.from('habit_logs').delete().eq('habit_id', id).eq('log_date', date); }
        else { const r = prompt("备注:"); await sb.from('habit_logs').insert([{ habit_id: id, log_date: date, remark: r || "" }]); }
        loadAll();
    }

    async function createHabit(n) { if(n) await sb.from('habit_definitions').insert([{name:n}]); loadAll(); }
    async function addTask(c, v) { if(v) await sb.from('todos').insert([{category:c, content:v, time_frame:getTag()}]); loadAll(); }
    async function toggleTodo(id, st) { await sb.from('todos').update({is_completed:!st}).eq('id',id); loadAll(); }

    function renderTodos(list) {
        document.getElementById('work-todos').innerHTML = list.map(t => `
            <div class="todo-item">
                <i data-feather="${t.is_completed?'check-circle':'circle'}" style="color:${t.is_completed?'var(--blue)':'var(--border)'}" onclick="toggleTodo('${t.id}',${t.is_completed})"></i>
                <span style="${t.is_completed?'text-decoration:line-through;color:gray':''}">${t.content}</span>
            </div>`).join('');
    }

    function changeDate(s) { 
        if(currentFrame === 'day') viewDate.setDate(viewDate.getDate() + s);
        else viewDate.setDate(viewDate.getDate() + s * 7);
        loadAll(); 
    }
    
    function switchFrame(f) { 
        currentFrame = f; 
        document.querySelectorAll('.tab-btn').forEach(b => b.classList.toggle('active', b.innerText.includes(f==='day'?'日':'周')));
        loadAll(); 
    }

    window.onload = loadAll;
</script>
</body>
</html>
