<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>我的全能成就看板</title>
    <script src="https://unpkg.com/feather-icons"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root { --bg: #F2F2F7; --card: #FFFFFF; --blue: #007AFF; --green: #34C759; --orange: #FF9500; --text: #1C1C1E; --gray: #8E8E93; --border: #E5E5EA; }
        body { background: var(--bg); color: var(--text); font-family: -apple-system, sans-serif; padding: 15px; margin: 0; padding-bottom: 50px; }
        .container { max-width: 900px; margin: 0 auto; }
        
        /* 顶部导航 */
        .tabs { display: flex; background: #E3E3E8; border-radius: 10px; padding: 2px; margin-bottom: 15px; }
        .tab-btn { flex: 1; border: none; padding: 10px; border-radius: 8px; font-size: 14px; cursor: pointer; background: none; }
        .tab-btn.active { background: white; box-shadow: 0 2px 5px rgba(0,0,0,0.1); font-weight: 600; }
        
        .date-nav { display: flex; align-items: center; justify-content: center; gap: 20px; margin-bottom: 15px; }
        #current-date-label { font-size: 15px; font-weight: 700; text-align: center; min-width: 200px; line-height: 1.3; }

        .card { background: var(--card); border-radius: 18px; padding: 20px; margin-bottom: 15px; box-shadow: 0 2px 15px rgba(0,0,0,0.03); }
        .header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 12px; font-weight: 700; border-bottom: 1px solid var(--border); padding-bottom: 8px; }

        /* 核心：习惯打卡日历 (固定显示) */
        .habit-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 4px; text-align: center; margin-top: 10px; }
        .weekday { font-size: 10px; color: var(--gray); margin-bottom: 4px; }
        .day-cell { aspect-ratio: 1; display: flex; align-items: center; justify-content: center; border-radius: 8px; font-size: 12px; cursor: pointer; background: #F9F9FB; transition: 0.2s; }
        .day-cell.active { background: var(--orange); color: white; font-weight: bold; }
        .day-cell.today { border: 2px solid var(--blue); }
        
        /* 任务列表 */
        .todo-item { display: flex; align-items: center; gap: 10px; padding: 10px 0; border-bottom: 1px solid #F9F9FB; }
        input[type="text"], textarea { border: none; outline: none; width: 100%; font-size: 15px; background: transparent; }
        textarea { background: #F9F9FB; border-radius: 12px; padding: 12px; height: 100px; resize: none; margin-top: 10px; border: 1px solid var(--border); }
        
        .btn-add-habit { background: none; border: 1px dashed var(--orange); color: var(--orange); padding: 8px; border-radius: 10px; width: 100%; cursor: pointer; font-size: 14px; margin-top: 10px; }
    </style>
</head>
<body>

<div class="container">
    <div class="tabs">
        <button class="tab-btn active" onclick="switchFrame('day')">日报</button>
        <button class="tab-btn" onclick="switchFrame('week')">周报</button>
        <button class="tab-btn" onclick="switchFrame('year')">年报</button>
    </div>

    <div class="date-nav">
        <i data-feather="chevron-left" onclick="changeDate(-1)"></i>
        <div id="current-date-label">加载中...</div>
        <i data-feather="chevron-right" onclick="changeDate(1)"></i>
    </div>

    <div id="habit-section">
        </div>
    <button class="btn-add-habit" onclick="createNewHabit()">+ 新增习惯 (如: 体重记录)</button>

    <div style="margin: 20px 0; border-top: 2px solid var(--border);"></div>

    <div id="main-task-card" class="card">
        <div class="header">
            <span id="task-title">今日任务清单</span>
            <i data-feather="edit-3"></i>
        </div>
        <div id="todo-list"></div>
        <div class="todo-item" id="input-row">
            <i data-feather="plus" style="color:var(--gray)"></i>
            <input type="text" id="new-todo-input" placeholder="输入内容按回车..." onkeypress="if(event.key==='Enter') handleAddTodo(this.value)">
        </div>
        <textarea id="summary-input" placeholder="写点心得总结..." onblur="saveSummary(this.value)"></textarea>
    </div>
</div>

<script>
    const SB_URL = "https://jklxlcobtwtgddifcmlx.supabase.co";
    const SB_KEY = "sb_publishable_bjEGqcp5cYThRF-fvqUceg_zyLVXIAY"; 
    const sb = supabase.createClient(SB_URL, SB_KEY);

    let currentFrame = 'day', viewDate = new Date();

    // 核心逻辑：获取周数信息（2026.01.01周四 - 2026.01.04周日）
    function getWeekDetail(date) {
        const d = new Date(date);
        const day = (d.getDay() + 6) % 7;
        const monday = new Date(d); monday.setDate(d.getDate() - day);
        const sunday = new Date(monday); sunday.setDate(monday.getDate() + 6);
        
        const fmt = (dt) => `${dt.getFullYear()}.${String(dt.getMonth()+1).padStart(2,'0')}.${String(dt.getDate()).padStart(2,'0')}周${['日','一','二','三','四','五','六'][dt.getDay()]}`;
        
        // 计算周数
        const startOfYear = new Date(d.getFullYear(), 0, 1);
        const weekNum = Math.ceil((((d - startOfYear) / 84600000) + startOfYear.getDay() + 1) / 7);
        
        return { num: weekNum, range: `${fmt(monday)} - ${fmt(sunday)}` };
    }

    function getTag() {
        const y = viewDate.getFullYear(), m = viewDate.getMonth()+1, d = viewDate.getDate();
        if (currentFrame === 'day') return `${y}-${m}-${d}`;
        if (currentFrame === 'week') return `${y}-W${getWeekDetail(viewDate).num}`;
        return `${y}-YEAR`;
    }

    async function loadPage() {
        updateNavLabel();
        const tag = getTag();

        const [habits, logs, todos, summary] = await Promise.all([
            sb.from('habit_definitions').select('*').order('created_at'),
            sb.from('habit_logs').select('*'),
            sb.from('todos').select('*').eq('time_frame', tag).order('created_at'),
            sb.from('summaries').select('*').eq('time_frame', tag).single()
        ]);

        renderHabitCalendars(habits.data || [], logs.data || []);
        renderTodos(todos.data || []);
        document.getElementById('summary-input').value = summary.data?.content || '';
        feather.replace();
    }

    // 渲染日历模式的习惯打卡
    function renderHabitCalendars(defs, allLogs) {
        const container = document.getElementById('habit-section');
        const now = new Date();
        const y = now.getFullYear(), m = now.getMonth();

        container.innerHTML = defs.map(h => {
            const hLogs = allLogs.filter(l => l.habit_id === h.id);
            return `
                <div class="card">
                    <div class="header" style="color:var(--orange)">
                        <span><i data-feather="calendar" style="width:14px"></i> ${h.name}</span>
                        <span style="font-size:12px; color:var(--gray)">${y}年${m+1}月</span>
                    </div>
                    <div class="habit-grid">
                        ${['一','二','三','四','五','六','日'].map(w=>`<div class="weekday">${w}</div>`).join('')}
                        ${generateCalendarDays(y, m, h.id, hLogs)}
                    </div>
                </div>
            `;
        }).join('');
    }

    function generateCalendarDays(y, m, habitId, logs) {
        const firstDay = new Date(y, m, 1).getDay();
        const daysInMonth = new Date(y, m+1, 0).getDate();
        const offset = firstDay === 0 ? 6 : firstDay - 1;
        let html = '';
        for (let i = 0; i < offset; i++) html += '<div></div>';
        for (let d = 1; d <= daysInMonth; d++) {
            const dateStr = `${y}-${m+1}-${d}`;
            const isDone = logs.some(l => l.log_date === dateStr);
            const isToday = new Date().toDateString() === new Date(y, m, d).toDateString();
            html += `<div class="day-cell ${isDone?'active':''} ${isToday?'today':''}" onclick="toggleHabitLog('${habitId}','${dateStr}',${isDone})">${d}</div>`;
        }
        return html;
    }

    async function toggleHabitLog(id, date, done) {
        if(done) {
            await sb.from('habit_logs').delete().eq('habit_id', id).eq('log_date', date);
        } else {
            const remark = prompt("备注(可选):");
            await sb.from('habit_logs').insert([{ habit_id: id, log_date: date, remark: remark || "" }]);
        }
        loadPage();
    }

    // 基础任务逻辑
    function renderTodos(list) {
        document.getElementById('todo-list').innerHTML = list.map(t => `
            <div class="todo-item">
                <i data-feather="${t.is_completed?'check-circle':'circle'}" onclick="updateTodo('${t.id}',${t.is_completed})" style="color:${t.is_completed?'var(--blue)':'var(--border)'}"></i>
                <span style="${t.is_completed?'text-decoration:line-through;color:gray':''}">${t.content}</span>
            </div>
        `).join('');
    }

    async function handleAddTodo(val) {
        if(!val) return;
        await sb.from('todos').insert([{ category: 'general', content: val, time_frame: getTag() }]);
        document.getElementById('new-todo-input').value = '';
        loadPage();
    }

    async function updateTodo(id, st) {
        await sb.from('todos').update({ is_completed: !st }).eq('id', id);
        loadPage();
    }

    async function saveSummary(val) {
        await sb.from('summaries').upsert({ content: val, time_frame: getTag(), category: 'general' }, { onConflict: 'time_frame,category' });
    }

    async function createNewHabit() {
        const name = prompt("输入新习惯名称:");
        if(name) await sb.from('habit_definitions').insert([{ name }]);
        loadPage();
    }

    function updateNavLabel() {
        const label = document.getElementById('current-date-label');
        const title = document.getElementById('task-title');
        if (currentFrame === 'day') {
            label.innerText = `${viewDate.getFullYear()}年${viewDate.getMonth()+1}月${viewDate.getDate()}日`;
            title.innerText = "今日任务清单";
        } else if (currentFrame === 'week') {
            const info = getWeekDetail(viewDate);
            label.innerHTML = `2026年 第 ${info.num} 周<br><span style="font-size:11px; font-weight:normal; color:gray">${info.range}</span>`;
            title.innerText = "本周重点目标";
        } else {
            label.innerText = `${viewDate.getFullYear()}年度`;
            title.innerText = "年度核心计划";
        }
    }

    function switchFrame(f) {
        currentFrame = f;
        document.querySelectorAll('.tab-btn').forEach(b => b.classList.toggle('active', b.innerText.includes(f==='day'?'日':f==='week'?'周':'年')));
        loadPage();
    }

    function changeDate(step) {
        if (currentFrame === 'day') viewDate.setDate(viewDate.getDate() + step);
        else if (currentFrame === 'week') viewDate.setDate(viewDate.getDate() + step * 7);
        else viewDate.setFullYear(viewDate.getFullYear() + step);
        loadPage();
    }

    window.onload = loadPage;
</script>
</body>
</html>
